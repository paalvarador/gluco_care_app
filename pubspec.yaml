name: gluco_care_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.1
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.5.1
  google_sign_in: ^6.2.1
  pdf: ^3.11.0
  printing: ^5.11.0
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Moví estos aquí porque son herramientas de desarrollo
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  # IMPORTANTE: Debes registrar la carpeta de assets para que el splash funcione
  assets:
    - assets/images/

# --- ESTAS SECCIONES VAN AL RAS (SIN ESPACIOS A LA IZQUIERDA) ---

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/icon.png"
  android_12:
    image: "assets/images/icon.png"
    color: "#ffffff"
  fullscreen: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon.png"